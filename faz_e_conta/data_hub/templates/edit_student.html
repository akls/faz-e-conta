{% extends 'base.html' %}

{% block content %}
<h1>Editar Aluno</h1>

<form method="post" class="form-container">
    {% csrf_token %}
    {{ form.as_p }}

    <div class="form-actions">
        <button type="submit" class="btn">Salvar</button>
        <a href="{% url 'show_student_details' aluno_id=form.instance.aluno_id %}" class="btn cancel">Cancelar</a>
    </div>
</form>
{% endblock %}
