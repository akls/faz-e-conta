{% load custom_filters %}
<!DOCTYPE html>
<html lang='en'>

<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Aluno Information</title>
</head>

<body>
    <h1>{{ alunos.nome_proprio }} {{ alunos.apelido }}</h1>





    <form method="get">
        <input type="text" name="q" placeholder="Pesquisar..." value="{{ query }}">
        <select name="sala">
            <option value="">Todas as Salas</option>
            {% for sala in salas %}
            <option value="{{ sala }}" {% if sala == sala_filter %}selected{% endif %}>{{ sala }}</option>
            {% endfor %}
            {% for sala_nome in sala_nomes %}
            <option value="{{ sala_nome }}" {% if sala_nome == sala_filter %}selected{% endif %}>{{ sala_nome }}</option>
            {% endfor %}
        </select>
        <button type="submit">Filtrar</button>
    </form>




    <table>
        {% for field in head %}
        <tr align='left'>
            <th>{{ field|replace:'_id_id, '|replace:'_, '}}</th>
            {% if alunos_dict|get_item:field == None %}
            <td>
                <hr style='border: none; border-top: 3px dashed black;'>
            </td>
            {% else %}
            <td>{{ alunos_dict|get_item:field }}</td>
            {% endif %}
        </tr>
        {% endif %}
        {% endfor %}
    </table>




    <a href="{% url 'show_students' %}">Voltar</a>
</body>

</html>
